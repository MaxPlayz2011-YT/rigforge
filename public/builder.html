<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom PC Builder - RigForge</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="builder.css" />
</head>
<body>

  <header class="navbar">
    <div class="logo">Rig<span>Forge</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="index.html#shop">Shop</a>
      <a href="builder.html">Custom Build</a>
    </nav>
    <button>🛒 Cart</button>
  </header>

  <div class="builder-container">

    <div class="builder-viewport">
      <iframe
        id="buildcores-iframe"
        src="https://buildcores.com"
        style="width: 100%; height: 100%; border: none; border-radius: 15px;"
        allow="fullscreen"
      ></iframe>
    </div>

    <div class="builder-sidebar">
      <h2>Configure Your PC</h2>

      <div class="part-selector">
        <label>CPU</label>
        <select id="cpu-select">
          <option value="">Select a processor...</option>
        </select>
        <div class="part-specs" id="cpu-specs"></div>
      </div>

      <div class="part-selector">
        <label>GPU</label>
        <select id="gpu-select">
          <option value="">Select a graphics card...</option>
        </select>
        <div class="part-specs" id="gpu-specs"></div>
      </div>

      <div class="part-selector">
        <label>RAM</label>
        <select id="ram-select">
          <option value="">Select memory...</option>
        </select>
        <div class="part-specs" id="ram-specs"></div>
      </div>

      <div class="part-selector">
        <label>Storage</label>
        <select id="storage-select">
          <option value="">Select storage...</option>
        </select>
        <div class="part-specs" id="storage-specs"></div>
      </div>

      <div class="part-selector">
        <label>Case</label>
        <select id="case-select">
          <option value="">Select a case...</option>
        </select>
        <div class="part-specs" id="case-specs"></div>
      </div>

      <div class="part-selector">
        <label>Cooling</label>
        <select id="cooling-select">
          <option value="">Select cooling...</option>
        </select>
        <div class="part-specs" id="cooling-specs"></div>
      </div>

      <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(0,212,255,0.2);">
        <button
          id="analyze-screen-btn"
          class="btn btn-primary"
          style="width: 100%; padding: 10px; font-size: 12px;">
          📸 Analyze with AI
        </button>
        <p style="margin-top: 8px; font-size: 11px; color: rgba(255,255,255,0.5);">
          Uses Claude vision to read the BuildCores builder and auto-fill components
        </p>
      </div>

      <div class="build-summary">
        <h3>Build Summary</h3>
        <div id="summary-list"></div>
        <div class="build-total">
          <span>Total:</span>
          <span id="total-price">$0.00</span>
        </div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 15px;">Add to Cart</button>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="builder.js"></script>

</body>
</html>
